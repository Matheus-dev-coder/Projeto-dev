<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stdylesheet">
    <title>Dev-Pagina</title>
</head>
<body>
    <p class="etiqueta">☄️Projeto- Dev-Pagina</p>

    <h1>Crie Sua Pagina <br><span>com um prompt</span></h1>

    <p class="subtitulo">Descreva o seu negócio e veja a IA criar uma pagina em segundos.</p>
     
    <div class="caixa-entrada">
        <textarea class="texto-pagina" placeholder="Descreva seu negócio...EX:Mercado, Restaurante, ect."></textarea>
        <button> Criar</button>
    </div>
    <div class="caixa-resultado">
        <p class="bloco-codigo">
            body {
                color:red;  
            }
            h1{
                color:black;
                font-size: 20px;
            }
        </p>

        <iframe class="bloco-site"></iframe>
    </div>
</body>
<script src="script.js"></script>
</html>
